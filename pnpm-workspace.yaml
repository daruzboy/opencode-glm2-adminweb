packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  # Akselerator native opsional (bullmq→msgpackr); fallback JS murni cukup → jangan build.
  msgpackr-extract: false
  prisma: true

onlyBuiltDependencies:
  - esbuild
  - prisma
  - '@prisma/client'
