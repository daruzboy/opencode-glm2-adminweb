name: CI

# T-011 — gerbang build loop: lint + typecheck + unit test pada setiap PR/push.
# Wajib hijau untuk merge (aktifkan branch protection di GitHub).
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: lint + typecheck + vitest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: digimaestro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d digimaestro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/digimaestro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Versi diatur oleh packageManager di package.json (hindari konflik versi)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: DB migration & seed (T-020 acceptance)
        run: |
          pnpm --filter @digimaestro/adapters exec prisma generate --schema prisma/schema.prisma
          pnpm --filter @digimaestro/adapters exec prisma migrate deploy --schema prisma/schema.prisma
          pnpm --filter @digimaestro/adapters exec prisma db seed --schema prisma/schema.prisma

      - name: Lint
        run: pnpm lint

      - name: Build (typecheck)
        run: pnpm build

      - name: Test
        run: pnpm test
